services:
  postgres:
    image: postgres:17-alpine
    container_name: preduzetnik-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: preduzetnik
      POSTGRES_PASSWORD: preduzetnik
      POSTGRES_DB: preduzetnik
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
